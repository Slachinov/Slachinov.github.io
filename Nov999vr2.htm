<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
display: grid;
grid-template-rows: 20px 1fr 30px 5px;
grid-template-columns: 100px 1fr;
background: red;
}
.top{ grid-column:1/-1; grid-row:1; background:red; }
.left{ grid-column:1; grid-row:2/4; background:lightblue; }
.rtop{grid-column:2; grid-row:2; background:lightgreen;}
.rbot{grid-column:2; grid-row:3; background:orange; }
.bottom{grid-column:1/-1; grid-row:4; background:blue;}
</style>
</head>
<body>
<div class="top"></div>
<div class="left"></div>
<div class="rtop"></div>
<div class="rbot"></div>
<div class="bottom"></div>
</body>
</html>
