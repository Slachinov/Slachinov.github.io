<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="js/qqv34.js"></script>
  <script src="js/qqns.js"></script>
  <script type="module" src="js/console.js"></script>
</head>
<body>
<script type="module">


import { m } from 'https://slachinov.github.io/Lib/pan/main.js';


GhPanel({edit: m.edit, parent: m.topPanel, all: m.all});


async function GhPanel(par = {}) {
    const edit = par.edit;
    const all = par.all;
    const parent = par.parent;


    const o = {
        token: qq.ls('token'),
        branch: 'master',
        owner: 'slachinov',
        repo: 'slachinov.github.io'
    };


    async function loadFile(path) {
        const { owner, repo, token, branch } = o;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
        const response = await fetch(url, {
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });
        if (!response.ok) throw new Error(`Failed to load file: ${response.statusText}`);
        const data = await response.json();
        const content = decodeURIComponent(escape(atob(data.content)));
        return { content, sha: data.sha };
    }


    async function saveFile(path, content, message, sha) {
        const { owner, repo, token, branch } = o;
        if (!sha) {
            try { sha = (await loadFile(path)).sha; } catch(e) {}
        }
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const body = { message: message || 'Update file', content: btoa(unescape(encodeURIComponent(content))), branch };
        if (sha) body.sha = sha;
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(`Failed to save file: ${response.statusText}`);
        return await response.json();
    }


    async function deleteFile(path, sha, message) {
        const { owner, repo, token, branch } = o;
        if (!sha) sha = (await loadFile(path)).sha;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const body = { message: message || 'Delete file', sha, branch };
        const response = await fetch(url, {
            method: 'DELETE',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(`Failed to delete file: ${response.statusText}`);
        return await response.json();
    }


    const skin = { style: { fontSize: '18px', margin: '3px' } };
    const mysk = qq.cs(skin, par.skinbutt || {});


    const container = qq.ce({
        tag: 'div',
        parent: parent,
        style: { background: '#f9f9f9', border: '1px solid #ccc', padding: '6px', borderRadius: '6px', display: 'inline-block' }
    });


    qq.ce({ tag: 'span', parent: container, it: 'Gh', style: { color: 'darkblue', background: 'white', fontSize: '16px' } });


    qq.ce({ tag: 'button', it: 'CL', parent: container, event: { click() { pathInput.value = ''; } } });


    let pathInput = qq.ce({ tag: 'input', parent: container, style: { width: '180px', margin: '0 6px' }, attr: { type: 'text', placeholder: 'Введите path' } }, mysk);
    let keyInput;


    qq.ce({ tag: 'button', it: 'Load', parent: container, event: {
        click: async () => {
            try {
                const file = await loadFile(pathInput.value.trim());
                edit.innerText = file.content;
            } catch(err) { qq.cl('Ошибка загрузки: ' + err.message); }
        }
    }}, mysk);


    qq.ce({ tag: 'button', it: 'All', parent: container, event: {
        click: async () => {
            try {
                const { default: getAllTree } = await import('https://slachinov.github.io/Lib/github/getall.js');
                const tree = await getAllTree({ owner: o.owner, repo: o.repo, token: o.token, branch: o.branch });
                all.innerHTML = ''; all.show();
                tree.forEach(item => {
                    qq.ce({
                        tag: 'div', parent: all, it: item.path,
                        style: { border: '1px solid #aaa', padding: '2px', margin: '2px', cursor: 'pointer', borderRadius: '3px', background:'#fff' },
                        event: {
                            click: async () => {
                                pathInput.value = item.path;
                                const file = await loadFile(item.path);
                                edit.innerText = file.content;
                                all.hide();
                            }
                        }
                    });
                });
            } catch(err) { qq.cl('Ошибка загрузки: ' + err.message); }
        }
    }}, mysk);


    qq.ce({ tag: 'button', it: 'Write', parent: container, event: {
        click: async () => {
            const path = pathInput.value.trim();
            if (!path) return;
            await saveFile(path, edit.innerText);
            qq.cl(`Файл записан: "${path}"`);
        }
    }}, qq.cs(mysk, { style: { background: 'red', color: 'white' } }));


    qq.ce({ tag: 'button', it: 'Delete', parent: container, event: {
        click: async () => {
            const path = pathInput.value.trim();
            if (!path) return;
            all.innerHTML = '';
            all.show();
            qq.ce({
                tag: 'div',
                parent: all,
                it: 'Вы действительно хотите удалить: ' + path,
                style: { border: '1px solid #f00', padding: '4px', margin: '2px', background:'#fee' }
            });
            qq.ce({ tag: 'button', parent: all, it: 'Да', event: async () => {
                await deleteFile(path);
                edit.innerText = '';
                all.hide();
                qq.cl(`Удалено: "${path}"`);
            }});
            qq.ce({ tag: 'button', parent: all, it: 'Нет', event: () => all.hide() });
        }
    }}, qq.cs(mysk, { style: { background: 'red', color: 'white' } }));


    qq.ce({ tag: 'button', parent: container, it: '\u2699', style: { fontSize: '18px', padding: '2px 6px' }, event: { click: () => qq.cl('Нажата кнопка шестеренка') } });


    return container;
}


</script>
</body>
</html>
