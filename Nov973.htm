<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="js/qqv34.js"></script>
<script src="js/qqns.js"></script>
<script type="module" src="js/console.js"></script>
</head>
<body>
<script type="module">


import { m } from 'https://slachinov.github.io/Lib/pan/main.js';


import {} from 'https://slachinov.github.io/Editor/buttonsEdit.js';
import CreateLocalStoragePanel from 'https://slachinov.github.io/Editor/panelLs.V2.js';


CreateLocalStoragePanel({edit:m.edit,parent:m.topPanel,all:m.all});


GhPanel({ edit: m.edit, all: m.all, parent: m.topPanel });


async function GhPanel(par = {}) {
    const edit = par.edit;
    const all = par.all;
    const parent = par.parent;


    let o = {
        token: qq.ls('token'),
        branch: 'master',
        owner: 'slachinov',
        repo: 'slachinov.github.io'
    };


    async function loadFile(path) {
        const { owner, repo, token, branch } = o;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
        const response = await fetch(url, {
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) throw new Error(`Failed to load file: ${response.statusText}`);
        const data = await response.json();
        return { content: decodeURIComponent(escape(atob(data.content))), sha: data.sha };
    }


    async function saveFile(path, content, sha) {
        const { owner, repo, token, branch } = o;
        if (!sha) {
            try { sha = (await loadFile(path)).sha; } catch (e) {}
        }
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const body = { message: 'Update file', content: btoa(unescape(encodeURIComponent(content))), branch };
        if (sha) body.sha = sha;
        const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!res.ok) throw new Error(`Failed to save file: ${res.statusText}`);
    }


    async function deleteFile(path, sha) {
        const { owner, repo, token, branch } = o;
        if (!sha) sha = (await loadFile(path)).sha;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const body = { message: 'Delete file', sha, branch };
        const res = await fetch(url, { method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!res.ok) throw new Error(`Failed to delete file: ${res.statusText}`);
    }


    const skin = { style: { fontSize: '18px', margin: '3px' } };
    let mysk = qq.cs(skin, par.skinbutt || {});


    const container = qq.ce({ tag: 'div', parent, style: { background: '#f9f9f9', border: '1px solid #ccc', padding: '6px', borderRadius: '6px', display: 'inline-block' } });
    qq.ce({ tag: 'span', parent: container, it: 'Gh', style: { color: 'darkblue', background: 'white', fontSize: '16px' } });


// Кнопка очистки pathInput
let pathInput;
const clButton = qq.ce({
    tag: 'button',
    it: 'CL',
    parent: container,  // куда вставляем, например твой контейнер
    style: { 
        fontSize: '18px', 
        margin: '6px', 
        padding: '4px 10px',
        background: '#eee',
        border: '1px solid #ccc',
        borderRadius: '4px',
        cursor: 'pointer'
    },
    event: { 
        click() {
            pathInput.value = '';
            all.clear();   // очищаем панель all
            all.hide();    // скрываем панель all
        } 
    }
});
    // input для path
    pathInput = qq.ce({ tag: 'input', parent: container, style: { width: '180px', marginLeft: '6px', marginRight: '6px' }, attr: { type: 'text', placeholder: 'Введите path' } }, mysk);


    // Load
    qq.ce({
        tag: 'button', parent: container, it: 'Load',
        event: { click: async () => { const path = pathInput.value.trim(); if (!path) return; try { edit.innerText = (await loadFile(path)).content; } catch (e) { qq.cl('Ошибка: '+e.message); } } }
    }, mysk);


    // All
    qq.ce({
        tag: 'button', parent: container, it: 'All',
        event: {
            click: async () => {
                all.clear(); all.hide();
                try {
                    const { default: getAllTree } = await import('https://slachinov.github.io/Lib/github/getall.js');
                    const tree = await getAllTree({ owner: o.owner, repo: o.repo, token: o.token, branch: o.branch });
                    all.clear(); all.show();
                    tree.forEach(item => {
                        qq.ce({
                            tag: 'div', parent: all, it: item.path, style: { border: '1px solid #aaa', padding: '2px', margin: '2px', cursor: 'pointer', borderRadius: '3px', background:'#fff' },
                            event: {
                                click: async () => {
                                    pathInput.value = item.path;
                                    edit.innerText = (await loadFile(item.path)).content;
                                    all.clear(); all.hide();
                                }
                            }
                        });
                    });
                } catch(e){ qq.cl('Ошибка: '+e.message); }
            }
        }
    }, mysk);


    // Write
    qq.ce({
        tag: 'button', parent: container, it: 'Write',
        style: qq.cs(mysk, { style: { background: 'red', color: 'white' } }).style,
        event: { click: async () => { const path = pathInput.value.trim(); if (!path) return; try { await saveFile(path, edit.innerText); qq.cl(`Записано: "${path}"`); } catch(e){ qq.cl('Ошибка: '+e.message); } } }
    });


    // Delete
    qq.ce({
        tag: 'button', parent: container, it: 'Delete',
        style: qq.cs(mysk, { style: { background: 'red', color: 'white' } }).style,
        event: {
            click: async () => {
                const path = pathInput.value.trim(); if (!path) return;
                all.clear(); all.hide();
                let sha;
                try { sha = (await loadFile(path)).sha; } catch(e){ qq.cl('Файл не найден'); all.clear(); all.hide(); return; }
                all.show();
                qq.ce({ tag:'div', parent:all, it:`Удалить "${path}"?`, style:{padding:'6px', margin:'6px', fontSize:'16px', fontWeight:'bold'} });
                qq.ce({
                    tag:'button', parent:all, it:'Да',
                    style:{ background:'red', color:'white', margin:'12px', padding:'8px 16px', fontSize:'20px', fontWeight:'bold', borderRadius:'6px' },
                    event:{ click: async ()=>{ try { await deleteFile(path, sha); edit.innerText=''; all.clear(); all.hide(); qq.cl(`Файл "${path}" удалён`); } catch(e){ qq.cl('Ошибка: '+e.message); } } }
                });
                qq.ce({
                    tag:'button', parent:all, it:'Нет',
                    style:{ margin:'12px', padding:'8px 16px', fontSize:'20px', fontWeight:'bold', borderRadius:'6px' },
                    event:{ click: ()=>{ all.clear(); all.hide(); } }
                });
            }
        }
    });


    return container;
}


</script>
</body>
</html>
