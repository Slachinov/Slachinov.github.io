<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />


<style>
html, body {
  height: 100%;
  margin: 0;
}


body {
  display: grid;


  grid-template-columns: minmax(100px, max-content) 1fr;


  grid-template-rows: auto 1fr auto;


  gap: 6px;
  padding: 6px;
  box-sizing: border-box;


  background: #f5f5f5;
}


/* ОБЩИЙ СТИЛЬ ДЛЯ ВСЕХ БЛОКОВ */
div {
  border: 2px solid #333;
  border-radius: 6px;
  padding: 10px;
  box-sizing: border-box;
}


/* верх */
.top {
  grid-column: 1 / 3;
  min-height: 10px;
  background: #cfe3ff;
}


/* низ */
.bottom {
  grid-column: 1 / 3;
  background: #e6d9ff;
}


/* левый сайдбар */
.left {
  grid-row: 2;
  min-width: 100px;
  background: #ffe7c7;
}


/* правая верхняя */
.right-top {
  background: lightgreen;
}


/* правая нижняя */
.right-bottom {
  min-height: 10px;
  background: #ffd9d9;
}
</style>


</head>
<body>


<div class="top">Верхняя панель111</div>


<div class="left">Левая панель</div>


<div class="right-top">Правая верхняя</div>
<div class="right-bottom">Правая нижняя</div>


<div class="bottom">Нижняя панель</div>


</body>
</html>
