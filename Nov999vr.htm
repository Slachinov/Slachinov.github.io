<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
  display: grid;
  grid-template-columns: 100px 1fr;
  grid-template-rows: 10px 1fr 10px 5px;
  min-height: 100vh;
  margin: 0;
}


/* 1. Верхняя — вся ширина */
.top {
  grid-column: 1 / -1;
  background: red;
}


/* 3. Левая — span 2 строки (2 и 3) */
.left {
  grid-column: 1;
  grid-row: 2 / 4;
  background: lightblue;
}


/* 4. Правая верхняя */
.right-top {
  grid-column: 2;
  grid-row: 2;
  background: lightgreen;
}


/* 5. Правая нижняя */
.right-bottom {
  grid-column: 2;
  grid-row: 3;
  min-height: 10px;
  background: orange;
}


/* 2. Нижняя — вся ширина */
.bottom {
  grid-column: 1 / -1;
  background: blue;
}
</style>
</head>


<body>



<div class="top">12345</div>
<div class="left"></div>
<div class="right-top"></div>
<div class="right-bottom"></div>
<div class="bottom"></div>


</body>
</html>
