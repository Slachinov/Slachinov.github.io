<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  display: grid;
  grid-template-columns: 200px 1fr;
  grid-template-rows: 80px 1fr 80px;
  height: 100vh;
  gap: 5px;
}


div {
  border: 2px solid black;
  background: lightgray;
}


.top {
  grid-column: 1 / 3;
  background: lightblue;
}


.left {
  grid-row: 2;
  background: orange;
}


.right-top {
  grid-column: 2;
  grid-row: 2;
  background: lightgreen;
}


.right-bottom {
  grid-column: 2;
  grid-row: 2;
  align-self: end;
  background: pink;
}


.bottom {
  grid-column: 1 / 3;
  background: violet;
}
</style>
</head>


<body>


<div class="top">TOP55</div>
<div class="left">LEFT</div>
<div class="right-top">RIGHT TOP</div>
<div class="right-bottom">RIGHT BOTTOM</div>
<div class="bottom">BOTTOM</div>


</body>
</html>
