<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
display: grid;
grid-template-columns: 100px 1fr;
grid-template-rows: 10px 1fr 10px 5px;
min-height: 100vh;
}
.top {
grid-column: 1 / -1;
grid-row: 1;
background: red;
}
.left {
grid-column: 1;
grid-row: 2 / 4;
background: lightblue;
}
.right-top {
grid-column: 2;
grid-row: 2;
background: lightgreen;
}
.right-bottom {
grid-column: 2;
grid-row: 3;
background: orange;
}
.bottom {
grid-column: 1 / -1;
grid-row: 4;
background: blue;
}
</style>
</head>
<body>
<div class="top">888</div>
<div class="left"></div>
<div class="right-top"></div>
<div class="right-bottom"></div>
<div class="bottom"></div>
</body>
</html>
