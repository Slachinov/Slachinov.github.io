<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />


<style>
html, body {
  height: 100%;
  margin: 0;
}


body {
  display: grid;


  grid-template-columns: minmax(100px, max-content) 1fr;
  grid-template-rows: auto 1fr 1fr auto;


  grid-template-areas:
    "top top"
    "left rightTop"
    "left rightBottom"
    "bottom bottom";


  gap: 6px;
  padding: 6px;
  box-sizing: border-box;
}


/* зоны */
.top {
  grid-area: top;
  min-height: 10px;
  background: #cfe3ff;
  padding: 10px;
}


.left {
  grid-area: left;
  min-width: 100px;
  background: #ffe7c7;
  padding: 10px;
}


.right-top {
  grid-area: rightTop;
  background: lightgreen;
  padding: 10px;
}


.right-bottom {
  grid-area: rightBottom;
  min-height: 10px;
  background: #ffd9d9;
  padding: 10px;
}


.bottom {
  grid-area: bottom;
  background: #e6d9ff;
  padding: 10px;
}
</style>


</head>
<body>


<div class="top">Верхняя панель999</div>
<div class="left">Левая панель</div>
<div class="right-top">Правая верхняя</div>
<div class="right-bottom">Правая нижняя</div>
<div class="bottom">Нижняя панель</div>


</body>
</html>
