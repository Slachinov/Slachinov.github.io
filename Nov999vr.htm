<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  display: grid;
  grid-template-columns: 100px 1fr;
  grid-template-rows: 10px 1fr 10px 5px;
  min-height: 100vh;
  margin: 0;
}


.top {
  grid-column: 1 / -1;
  grid-row: 1;
  background: red;
}


.left {
  grid-column: 1;
  grid-row: 2 / 4;
  background: lightblue;
}


.right-top {
  grid-column: 2;
  grid-row: 2;
  background: lightgreen;
}


.right-bottom {
  grid-column: 2;
  grid-row: 3;
  min-height: 10px;
  background: orange;
}


.bottom {
  grid-column: 1 / -1;
  grid-row: 4;
  background: blue;
}
</style>
</head>
<body>


<div class="top">5555</div>
<div class="right-top"></div>
<div class="left"></div>
<div class="right-bottom"></div>
<div class="bottom"></div>


</body>
</html>
