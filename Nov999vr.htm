<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="/js/qqv34.js"></script>
  <script type="module" src="/js/console.js"></script>
<style>
* { border:1px solid black;margin: 0; padding: 0; box-sizing: border-box; }
html,body {height:100%;overflow:hidden}
body {
display: grid;
grid-template-columns: 100px 1fr;
grid-template-rows: 20px 1fr 30px 5px;
height:100dvh;
gap:3px;
}
.top {
grid-column: 1 / -1;
grid-row: 1;
background: red;
}
.left {
grid-column: 1;
grid-row: 2 / 4;
background: lightblue;
}
.right-top {
grid-column: 2;
grid-row: 2;
background: lightgreen;
}
.right-bottom {
grid-column: 2;
grid-row: 3;
background: orange;
}
.bottom {
grid-column: 1 / -1;
grid-row: 4/5;
background: blue;
}
</style>
</head>
<body>
<div class="top"><button>run</button></div>
<div class="left"></div>
<div class="right-top">TRATATA222</div>
<div class="right-bottom"></div>
<div class="bottom"></div>
</body>
</html>
