<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
html, body { height: 100%; }
body {
  padding-bottom: env(safe-area-inset-bottom);
}

html {background:green}
body {
display: grid;
grid-template-rows: 20px 1fr 30px 5px;
grid-template-columns: 100px 1fr;
background: red;
}
</style>
</head>
<body>
<div style="grid-column:1/-1;grid-row:1;background:red">555</div>
<div style="grid-column:1;grid-row:2/4;background:lightblue"></div>
<div style="grid-column:2;grid-row:2;background:lightgreen"></div>
<div style="grid-column:2;grid-row:3;background:orange"></div>
<div style="grid-column:1/-1;grid-row:4;background:blue"></div><span style="position:absolute;bottom:0px;background:yellow">1111</span>
</body>
</html>
