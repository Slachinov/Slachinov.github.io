<!doctype html>
<html>
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="js/qqv34.js"></script>
  <script type="module" src="js/console.js"></script>
</head>


<body>
<script type="module">
import { createFullscreenPanel } from 'https://slachinov.github.io/Lib/pan/1all1.js';
import f2p from 'https://slachinov.github.io/Lib/pan/2pv2.js';


const panel = createFullscreenPanel({});
const topp = f2p()[0];


qq.ce(topp, {
  style: {
    background: 'plum',
    border: '1px solid black',
    padding: '10px'
  }
});


let currentDB = null;
let dbSelect, storeBox, deleteBtn;


//
// UI
//
function initUI() {
let vii=qq.ce({tag:'div',parent:topp});
qq.ce({tag:'button',parent:vii,it:'X'});
  // DB select
  dbSelect = qq.ce({
    tag: 'select',
    parent: topp,
    style: { fontSize: '20px', display: 'block', margin: '10px 0' },
    event: {
      change: async (e) => {
        await openDBView(e.target.value);
      }
    }
  });


  // delete DB button
  deleteBtn = qq.ce({
    tag: 'button',
    parent: topp,
    it: 'DELETE DB',
    style: { margin: '10px 0', fontSize: '18px',background:'red' },
    event: {
      click: async () => {
  if (!currentDB) return;


  if (!confirm(`Delete DB "${currentDB}"?`)) return;


  const req = indexedDB.deleteDatabase(currentDB);


  req.onsuccess = async () => {
    qq.cl('Deleted DB:', currentDB);
    await loadDBs();
  };


  req.onerror = () => qq.er('Delete failed');
}
    }
  });


  // store list container
  storeBox = qq.ce({
    tag: 'div',
    parent: topp,
    style: { marginTop: '20px', fontSize: '18px' }
  });
}


//
// Load DB list
//
async function loadDBs() {
  const dbs = await indexedDB.databases();


  dbSelect.innerHTML = '';


  dbs.forEach(db => {
    qq.ce({
      tag: 'option',
      parent: dbSelect,
      val: db.name,
      it: `${db.name} (v${db.version})`
    });
  });


  if (dbs.length) {
    await openDBView(dbs[0].name);
  }
}


//
// Open DB view
//
async function openDBView(dbName) {
  if (!dbName) return;


  currentDB = dbName;
  storeBox.innerHTML = '';


  const req = indexedDB.open(dbName);


  req.onsuccess = async () => {
    const db = req.result;


    const storeNames = Array.from(db.objectStoreNames);


    for (const storeName of storeNames) {
      const count = await countStore(dbName, storeName);


      qq.ce({
        tag: 'div',
        parent: storeBox,
        it: `${storeName} → ${count} items`,
        style: {
          padding: '5px',
          borderBottom: '1px solid #444'
        }
      });
    }


    db.close();
  };
}


//
// Count records in store
//
function countStore(dbName, storeName) {
  return new Promise((resolve) => {
    const req = indexedDB.open(dbName);


    req.onsuccess = () => {
      const db = req.result;
      const tx = db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);


      const countReq = store.count();


      countReq.onsuccess = () => {
        resolve(countReq.result);
        db.close();
      };


      countReq.onerror = () => {
        resolve(0);
        db.close();
      };
    };
  });
}


//
// start
//
initUI();
loadDBs();


</script>
</body>
</html>
