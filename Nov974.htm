<body>
<script type="module">

import {m,butonsEditPanel,bottomPanel} from 'https://slachinov.github.io/Lib/pan/main.js';


import {} from 'https://slachinov.github.io/Editor/buttonsEdit.js';

LsCreateGithubPanel ({edit:m.edit,parent:m.topPanel,all:m.all});*/

export default function GhPanel(par = {}) {
    let edit = par.edit;
    let all = par.all;
    let parent = par.parent;


    const skin = { style: { fontSize: '18px', margin: '3px' } };
    let mysk = qq.cs(skin, par.skinbutt || {});


    // контейнер с мягким фоном и бордером
    let container = qq.ce({
        tag: 'div',
        parent: parent,
        style: { background: '#f9f9f9', border: '1px solid #ccc', padding: '6px', borderRadius: '6px', display: 'inline-block' }
    });


    // метка Gh без маргинов и паддингов
    qq.ce({
        tag: 'span',
        parent: container,
        it: 'Gh',
        style: { color: 'darkblue', background: 'white', fontSize: '16px' }
    });


    // кнопка очистки path без mysk
    qq.ce({
        tag: 'button',
        it: 'CL',
        parent: container,
        event: { click() { repoInput.value = ''; } }
    });


    // input для репозитория / path
    let repoInput = qq.ce({
        tag: 'input',
        parent: container,
        style: { width: '180px', marginLeft: '6px', marginRight: '6px' },
        attr: { type: 'text', placeholder: 'Введите path' }
    }, mysk);


    // Load репозиторий
    qq.ce({
        tag: 'button',
        it: 'Load',
        parent: container,
        event: {
            click: async () => {
                let path = repoInput.value.trim();
                if (!path) return;
                let items = await par.githubLoadRepo(path);
                renderItems(items);
            }
        }
    }, mysk);


    // input для ключа / элемента короткий
    let keyInput = qq.ce({
        tag: 'input',
        parent: container,
        style: { width: '150px', marginLeft: '6px', marginRight: '6px' },
        attr: { type: 'text', placeholder: 'Элемент' }
    }, mysk);


    // кнопки All / Write / Delete
    qq.ce({
        tag: 'button',
        it: 'All',
        parent: container,
        event: {
            click: async () => {
                let path = repoInput.value.trim();
                if (!path) return;
                let items = await par.githubAll(path);
                renderItems(items);
            }
        }
    }, mysk);


    qq.ce({
        tag: 'button',
        it: 'Write',
        parent: container,
        event: {
            click: async () => {
                let path = repoInput.value.trim();
                if (!path) return;
                let key = keyInput.value.trim();
                if (!key) return;
                let value = edit.innerText;
                await par.githubWrite(path, key, value);
                qq.cl(`Записано: "${key}"`);
            }
        }
    }, qq.cs(mysk, { style: { background: 'red', color: 'white' } }));


    qq.ce({
        tag: 'button',
        it: 'Delete',
        parent: container,
        event: {
            click: async () => {
                let path = repoInput.value.trim();
                if (!path) return;
                let key = keyInput.value.trim();
                if (!key) return;
                await par.githubDelete(path, key);
                edit.innerText = '';
                qq.cl(`Удалено: "${key}"`);
            }
        }
    }, qq.cs(mysk, { style: { background: 'red', color: 'white' } }));


    // рендер списка элементов
    function renderItems(items) {
        if (!items || items.length === 0) return;
        all.innerHTML = '';
        all.show();
        for (let key of items) {
            qq.ce({
                tag: 'div',
                parent: all,
                it: key,
                style: { border: '1px solid #aaa', padding: '2px', margin: '2px', cursor: 'pointer', borderRadius: '3px', background:'#fff' },
                event: {
                    click: async () => {
                        keyInput.value = key;
                        let path = repoInput.value.trim();
                        if (!path) return;
                        edit.innerText = await par.githubLoad(path, key) || '';
                        all.hide();
                    }
                }
            });
        }
    }


    return container;
}
//=========/
</script>
<script></script>
