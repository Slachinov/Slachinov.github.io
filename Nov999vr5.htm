const body = document.body;

  gridTemplateRows:'20px 1fr 30px 5px',

}});


const topp= qq.ce({tag:'div', parent:body, style:{

}});


const left = qq.ce({tag:'div', parent:body, style:{
  gridColumn:'1', gridRow:'2/4', background:'lightblue'
}});


const rightTop = qq.ce({tag:'div', parent:body, style:{

}});


const rightBottom = qq.ce({tag:'div', parent:body, style:{
  gridColumn:'2', gridRow:'3', background:'orange'
}});


const bottom = qq.ce({tag:'div', parent:body, style:{
  gridColumn:'1/-1', gridRow:'4', background:'blue'
}});
